    <link rel="stylesheet" href="assets/static/style.css">
</head>

<style>
    /* Page-specific layout: pin the logo to the top and center it */

        /* keep existing layout but push content to the top on the menu page */
        justify-content: flex-start;
    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding-top: 28px;
        gap: 18px;
    }

    .menu-logo {
        width: 680px;
        max-width: 94%;
        height: auto;
        display: block;
        margin: 0 auto;
    }
</style>
</head>

<body>
    <main class="menu-container">

        <img src="assets/img/pokemon.png" alt="Pokémon logo" class="menu-logo">

        <div class="menu-buttons" role="navigation" aria-label="Open applications">
            <button onclick="location.href='public/pokedex.html'">Open Pokédex</button>
            <button onclick="location.href='public/poketcg.html'">Open Pokémon TCG</button>
        </div>

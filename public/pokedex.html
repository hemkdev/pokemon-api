<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="../assets/static/style.css">
</head>

<body>

    <div class="container">

        <div class="search-row">
            <input type="text" id="pokemonName" placeholder="Enter Pokémon name">
            <button id="searchBtn" onclick="fetchData()">Search</button>
        </div>

        <div class="pokemon-card">
            <img id="pokemonSprite" src="" alt="Pokémon Sprite" style="display: none;">
            <h2 id="pokemonDisplayName" style="display:none"></h2>

            <div id="pokemonTypes" style="display:none">
                <strong class="title">Types</strong>
                <ul id="typesList"></ul>
            </div>

            <div id="pokemonStats" style="display:none">
                <strong class="title">Stats</strong>
                <table id="statsTable">
                    <thead>
                        <tr>
                            <th>Stat</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div id="message" role="status"></div>
        </div>

    </div>
    <script src="../js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pokemon TCG</title>
        <link rel="stylesheet" href="../assets/static/style.css">
        <style>
            /* small page-specific layout for the TCG page */
            .tcg-container { max-width:1100px; margin:28px auto; padding:12px; }
            .tcg-search { display:flex; gap:8px; justify-content:center; margin-bottom:12px }
            #tcgQuery { flex:1 0 320px; padding:10px; border-radius:8px; border:1px solid #ddd }
            #tcgSearchBtn { padding:10px 14px; border-radius:8px; border:none; background:#4f46e5; color:#fff }
            .tcg-results { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:12px }
            .tcg-card { width:140px; background:#fff; border-radius:8px; padding:8px; text-align:center; box-shadow:0 6px 18px rgba(0,0,0,0.06) }
            .tcg-card img { width:100%; height:auto; border-radius:6px; display:block }
            .tcg-card-name { font-weight:700; font-size:0.9rem; margin-top:6px }
            .tcg-card-set { font-size:0.8rem; color:#666; margin-top:2px }
        </style>
</head>
<body>
        <div class="tcg-container">
            <div class="tcg-search">
                <input id="tcgQuery" placeholder="Search card name (e.g. Charizard)" />
                <button id="tcgSearchBtn">Search</button>
            </div>
            <div id="tcgMessage" role="status" style="text-align:center;margin-bottom:8px"></div>
            <div id="tcgResults" class="tcg-results"></div>
        </div>

        <script src="../js/poketcg.js"></script>
</body>

</html>
